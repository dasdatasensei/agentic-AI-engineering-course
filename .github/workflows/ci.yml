name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff format --check .
          ruff check .

      - name: Type check (mypy)
        # Scoped to the installed package + tests. The standalone teaching
        # scripts under sections/ intentionally reuse filenames (exercise.py,
        # solution.py, summariser.py), which mypy rejects as duplicate modules;
        # they are still linted by ruff below.
        run: mypy era_platform tests --strict

      - name: Unit tests
        run: pytest tests/unit/ -v

      - name: Integration tests
        run: pytest tests/integration/ -v
        env:
          # Integration tests mock all external API calls — no real keys needed in CI
          GOOGLE_API_KEY: "test-key"
          GROQ_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          LANGSMITH_API_KEY: "test-key"
